<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2a2a"/>
      <stop offset="100%" stop-color="#b80000"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd24a"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3ff"/>
      <stop offset="100%" stop-color="#0057d9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#75d63a"/>
      <stop offset="100%" stop-color="#2f8e1f"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc3b"/>
      <stop offset="100%" stop-color="#f49b00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>


  <!-- spark -->
  <g transform="translate(600 280)" filter="url(#shadow)">
    <path d="M0,-78 C12,-30 30,-12 78,0 C30,12 12,30 0,78 C-12,30 -30,12 -78,0 C-30,-12 -12,-30 0,-78 Z"
          fill="url(#goldGrad)"/>
    <path d="M-92,34 C-85,14 -72,7 -52,0 C-72,-7 -85,-14 -92,-34 C-99,-14 -112,-7 -132,0 C-112,7 -99,14 -92,34 Z"
          fill="#1778f2"/>
    <path d="M94,34 C101,14 114,7 134,0 C114,-7 101,-14 94,-34 C87,-14 74,-7 54,0 C74,7 87,14 94,34 Z"
          fill="#ff8c00"/>
    <circle cx="-130" cy="-20" r="5" fill="#ff8c00"/>
    <circle cx="-105" cy="55" r="4" fill="#1778f2"/>
    <circle cx="-70" cy="-80" r="6" fill="#ffb200"/>
    <circle cx="-35" cy="70" r="4" fill="#ffb200"/>
    <circle cx="40" cy="-95" r="5" fill="#ffb200"/>
    <circle cx="88" cy="78" r="4" fill="#ff8c00"/>
    <circle cx="122" cy="10" r="7" fill="#2ea7ff"/>
  </g>

  <!-- book -->
  <g transform="translate(600 500)" filter="url(#shadow)">
    <!-- base -->
    <path d="M-305,82 C-220,52 -90,40 0,62 C90,40 220,52 305,82 L280,154 C198,128 80,120 0,142 C-80,120 -198,128 -280,154 Z"
          fill="#0a245f"/>
    <path d="M-260,85 C-183,61 -74,54 0,72 C74,54 183,61 260,85 L244,124 C176,103 71,98 0,113 C-71,98 -176,103 -244,124 Z"
          fill="#d9d9d9"/>

    <!-- left pages -->
    <path d="M-16,98 C-56,20 -116,-32 -190,-78 C-220,-44 -244,7 -248,62 C-176,71 -102,84 -16,98 Z"
          fill="url(#orangeGrad)" stroke="#ffffff" stroke-width="8"/>
    <path d="M-28,94 C-72,12 -132,-44 -228,-102 C-258,-66 -286,-5 -293,55 C-204,63 -119,75 -28,94 Z"
          fill="url(#redGrad)" stroke="#ffffff" stroke-width="8"/>

    <!-- right pages -->
    <path d="M16,98 C56,20 116,-32 190,-78 C220,-44 244,7 248,62 C176,71 102,84 16,98 Z"
          fill="url(#blueGrad)" stroke="#ffffff" stroke-width="8"/>
    <path d="M28,94 C72,12 132,-44 228,-102 C258,-66 286,-5 293,55 C204,63 119,75 28,94 Z"
          fill="url(#greenGrad)" stroke="#ffffff" stroke-width="8"/>

    <!-- center binding -->
    <circle cx="0" cy="120" r="20" fill="#0a245f"/>
  </g>

  <!-- title -->
  <text x="600" y="825" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="138" font-weight="700" letter-spacing="3"
        fill="#ffffff">WENDERSON</text>

 <g transform="translate(600 905)">
  <line x1="-380" y1="28" x2="-170" y2="28" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <line x1="170" y1="28" x2="380" y2="28" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>

  <text x="0" y="18" text-anchor="middle"
      font-family="Poppins, Montserrat, sans-serif"
      font-size="82"
      font-weight="500"
      letter-spacing="2"
      fill="#FFFFFF"
      style="filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.3));">
  BOOKS
</text>
</g>
</svg>
